events {
}

# Nginx reverse proxy for GCS and MinIO emulators
# - client_max_body_size 0: unlimited file size
# - proxy_buffering off: required for resumable uploads

http {

  access_log /dev/stdout;
  error_log /dev/stderr;

  server {
    listen 8081;

    # GCS Emulator proxy with CORS headers
    location /gcs/ {
      client_max_body_size 0;

      proxy_pass http://gcs-emulator:4443/;
      proxy_redirect http://localhost:4443 http://localhost:8081;
      proxy_http_version 1.1;
      proxy_request_buffering off;
      proxy_buffering off;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      add_header Access-Control-Expose-Headers "Range, Location" always;

    }

    # MinIO S3 proxy
    location /minio/ {
      client_max_body_size 0;

      proxy_pass http://minio:9000/;
      proxy_http_version 1.1;
      proxy_request_buffering off;
      proxy_buffering off;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
