# Docker Compose for node-uploadx local development
# Run: docker compose -f .dev/docker-compose.yml up -d
# Stop: docker compose -f .dev/docker-compose.yml down
name: node-uploadx

services:
  # GCS emulator for Google Cloud Storage testing
  gcs-emulator:
    image: fsouza/fake-gcs-server:1.52
    ports:
      - '4443:4443' # Emulator API port
    command: -scheme http -port "4443" -external-url http://localhost:8081/gcs -cors-headers authorization,content-range,content-type,ngsw-bypass
    volumes:
      # - ../examples/uploads:/storage # Mount for local files
      - gcs-storage:/storage
    networks:
      - uploadx-network

  # Nginx proxy for GCS with CORS headers
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - '8081:8081' # Proxy port
    depends_on:
      - gcs-emulator
    networks:
      - uploadx-network

  # GCS initialization - create bucket
  gcs-init:
    image: curlimages/curl:latest
    depends_on:
      gcs-emulator:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        curl -s -X POST 'http://gcs-emulator:4443/storage/v1/b' \
          -H 'Content-Type: application/json' \
          -d '{"name": "${GCS_BUCKET:-my-bucket}" }' \
          || echo 'Bucket may already exist'
    networks:
      - uploadx-network

  # S3 emulator (MinIO) for testing
  minio:
    image: minio/minio:RELEASE.2024-09-09T16-59-28Z
    ports:
      - '9000:9000' # S3 API port
      - '9001:9001' # Web Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - uploadx-network

  # MinIO initialization - create bucket and configure CORS
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set myminio http://minio:9000 minioadmin minioadmin
        mc admin config set myminio api cors_allow_origin='${MINIO_CORS_ORIGIN:-*}'
        mc mb -p myminio/${S3_BUCKET:-my-bucket}
        exit 0
    networks:
      - uploadx-network
  # Redis for testing
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - uploadx-network

volumes:
  minio-data:
    driver: local
  gcs-storage:
    driver: local
  redis-data:
    driver: local

networks:
  uploadx-network:
    driver: bridge
